name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build addon package
        run: |
          mkdir -p package/AGRO
          cp AGRO.toc package/AGRO/
          cp AGRO.lua package/AGRO/
          cp enUS.lua package/AGRO/
          cp ptBR.lua package/AGRO/
          cd package
          zip -r ../AGRO.zip AGRO

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: AGRO
          path: AGRO.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AGRO.zip
